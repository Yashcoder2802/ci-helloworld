name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build and test
        run: ./gradlew test

      - name: Jacoco badge
        uses: cicirello/jacoco-badge-generator@v2.9.0
        with:
          generate-branches-badge: true
          fail-on-coverage-decrease: true
          fail-on-branches-decrease: true
          jacoco-csv-file: build/reports/jacoco/test/jacocoTestReport.csv
          jacoco-xml-file: build/reports/jacoco/test/jacocoTestReport.xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: build/reports/jacoco/test/html

      - name: Build Docker image
        run: |
          ./gradlew installDist
          if [ -z "${{ secrets.DOCKERHUB_USERNAME }}" ]; then echo "Missing DOCKERHUB_USERNAME secret" && exit 1; fi
          docker build -t $DOCKER_IMAGE_SHA -t $DOCKER_IMAGE_LATEST .
        env:
          DOCKER_IMAGE_SHA: ${{ secrets.DOCKERHUB_USERNAME }}/ci-helloworld:${{ github.sha }}
          DOCKER_IMAGE_LATEST: ${{ secrets.DOCKERHUB_USERNAME }}/ci-helloworld:latest

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Docker image
        run: |
          docker push $DOCKER_IMAGE_SHA
          docker push $DOCKER_IMAGE_LATEST
        env:
          DOCKER_IMAGE_SHA: ${{ secrets.DOCKERHUB_USERNAME }}/ci-helloworld:${{ github.sha }}
          DOCKER_IMAGE_LATEST: ${{ secrets.DOCKERHUB_USERNAME }}/ci-helloworld:latest
