name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build and test
        run: ./gradlew test

      - name: Jacoco badge
        uses: cicirello/jacoco-badge-generator@v2.9.0
        with:
          generate-branches-badge: true
          fail-on-coverage-decrease: true
          fail-on-branches-decrease: true
          jacoco-csv-file: build/reports/jacoco/test/jacocoTestReport.csv
          jacoco-xml-file: build/reports/jacoco/test/jacocoTestReport.xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: build/reports/jacoco/test/html

      - name: Build Docker image
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          if [ -z "$DOCKER_USERNAME" ]; then
            echo "DOCKERHUB_USERNAME secret is missing; set it in repo Settings → Secrets and variables → Actions" >&2
            exit 1
          fi
          IMAGE="$DOCKER_USERNAME/ci-helloworld:${GITHUB_SHA}"
          ./gradlew installDist
          docker build -t "$IMAGE" .
          echo "Built image: $IMAGE"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Docker image
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          if [ -z "$DOCKER_USERNAME" ]; then
            echo "DOCKERHUB_USERNAME secret is missing; set it in repo Settings → Secrets and variables → Actions" >&2
            exit 1
          fi
          IMAGE="$DOCKER_USERNAME/ci-helloworld:${GITHUB_SHA}"
          docker push "$IMAGE"
          echo "Pushed image: $IMAGE"
